<div id="calendar"></div>

<!-- CREATION DU SCRIPTE POUR LE CALENDRIER -->
  <script>
          // FONCTION POUR RECUPERER L'ANNEE LE JOUR
          function getDateInMonth (month , year) 
          {
              // nombre de jour du mois        
                  return new Date(year, month ,0).getDate();

          }          

          function createCalendar(month, year)
          {       
            // CREATION DE LA CONSTANTE CALENDAR ET REMISE A 0
            const calendar = document.querySelector("#calendar");
            calendar.innerHTML= '';

            let date=1;
            const daysInMonth = getDateInMonth(month+1,year);

            for( let i=0; i< 6 ;i++)
            {
              let week =document.createElement('tr');
            } 
             
            for( let j=0 ;j<7 ; j++)
            {
            if (i===0 && j<new date(year,month ,1).getday() ||date> daysInMonth)
                {
                  let day=document.createElement('td');
                  week.appenchild(day);
                }
            
            else             
            {
              let day=document.createElement('tr');
              day.innerText=date;
              week.appenchild(day);
              date++;
            }      
            calendar.appenchild(week);
            }  


          }

          const currentdate = new date();
          createCalendar(currentdate.getmonth()+1, currentdate.getfullyear());


  </script>
