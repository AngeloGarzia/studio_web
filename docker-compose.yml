services:
  minio:
    image: minio/minio:latest
    container_name: sdg-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio_init:
    image: minio/mc:latest
    container_name: sdg-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -lc
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb -p local/studio-media || true
        # Bucket reste privé (recommandé). Le backend sert les fichiers via /api/public/media/:id
        echo "MinIO ready. Bucket studio-media ok."
    restart: "no"

volumes:
  minio_data:

